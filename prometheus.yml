global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # App services — each will expose /metrics on :9000 once instrumented.
  # Targets show as DOWN until the Go services are wired up; harmless.
  - job_name: 'atbatwatch'
    static_configs:
      - targets:
          - 'api:9000'
          - 'poller:9000'
          - 'fanout:9000'
          - 'delivery:9000'
        labels:
          env: 'prod'
