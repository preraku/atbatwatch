services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "1"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "1"

  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "1"

  poller:
    build:
      context: .
      dockerfile: docker/poller.Dockerfile
    command: ["atbatwatch", "run-poller"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "1"

  fanout:
    build:
      context: .
      dockerfile: docker/fanout.Dockerfile
    command: ["atbatwatch", "run-fanout"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "1"

  delivery:
    build:
      context: .
      dockerfile: docker/delivery.Dockerfile
    command: ["atbatwatch", "run-delivery"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "1"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ["atbatwatch", "run-api"]
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "1"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "1"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
