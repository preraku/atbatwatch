<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>atbatwatch — Log in</title>
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", (saved ? saved === "dark" : prefersDark) ? "dark" : "light");
    })();
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --border: #999;
      --err: #c00;
    }
    [data-theme="dark"] {
      --bg: #141414;
      --fg: #e0e0e0;
      --border: #555;
      --err: #ff6b6b;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 16px; background: var(--bg); color: var(--fg); transition: background 0.2s, color 0.2s; }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; font-size: 0.9rem; }
    input { display: block; width: 100%; padding: 6px 8px; margin-bottom: 16px; font-family: system-ui, sans-serif; font-size: 0.9rem; border: 1px solid var(--border); background: var(--bg); color: var(--fg); }
    button { padding: 7px 16px; font-family: system-ui, sans-serif; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--fg); }
    .err { color: var(--err); margin-top: 12px; font-size: 0.85rem; }
    a { color: inherit; }
    #theme-toggle { position: fixed; bottom: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--fg); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: background 0.2s, border-color 0.2s, opacity 0.15s; z-index: 1000; }
    #theme-toggle:hover { opacity: 0.6; }
  </style>
</head>
<body>
  <h1>atbatwatch / log in</h1>
  <form id="form">
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" required>

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" required>

    <button type="submit">Log in</button>
    <p class="err" id="err" hidden></p>
  </form>
  <p style="margin-top:24px;font-size:0.85rem;">No account? <a href="signup.html">Sign up</a></p>

  <script type="module">
    import { setToken, token, request } from "./api.js";
    import { initTheme } from "./theme.js";

    initTheme();

    if (token()) location.href = "dashboard.html";

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("err");
      errEl.hidden = true;
      try {
        const data = await request("POST", "/auth/login", {
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        });
        setToken(data.token);
        location.href = "dashboard.html";
      } catch (err) {
        errEl.textContent = err.message;
        errEl.hidden = false;
      }
    });
  </script>
</body>
</html>
